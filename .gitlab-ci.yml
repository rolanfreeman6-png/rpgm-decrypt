# GitLab CI for rpgm-decrypt.
#
# Mirrors the GitHub Actions build+test gate. Linux coverage runs on the free
# gitlab.com Docker runners (.NET 10 SDK image). Windows coverage runs on the
# GitLab SaaS Windows runners (tag saas-windows-medium-amd64): the F# product
# is built+tested automatically there; the OCaml port is a manual job (opam on
# Windows is a slow build, so it stays opt-in to spare trial CI minutes).
# macOS coverage stays on GitHub Actions / local runs.
#
# TreatWarningsAsErrors is enforced both by fsharp/src/Directory.Build.props and the
# explicit -p: flag below, matching the GitHub `test` job.

# GitLab-managed security scanners (Ultimate). SAST analyses the source,
# Secret Detection scans history for leaked credentials, Dependency Scanning
# checks NuGet packages for known CVEs. Results land in Security & Compliance →
# Vulnerability report. Each template defines its own job in the `test` stage.
include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml

stages:
  - test
  - fuzz
  - publish

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

default:
  image: mcr.microsoft.com/dotnet/sdk:10.0

build-test:
  stage: test
  script:
    - dotnet restore fsharp/src/RpgmDecrypt.slnx
    - dotnet build fsharp/src/RpgmDecrypt.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true
    - dotnet run --project fsharp/src/RpgmDecrypt.Tests -c Release --no-build

# ---- F# build + test on the GitLab SaaS Windows runner --------------------
# Windows coverage for the actually-shipped decryptor. .NET 10 is too new to be
# preinstalled on the SaaS image, so we fetch it via the official install script.
build-test-windows:
  stage: test
  tags:
    - saas-windows-medium-amd64
  before_script:
    - Invoke-WebRequest -Uri 'https://dot.net/v1/dotnet-install.ps1' -OutFile 'dotnet-install.ps1'
    - .\dotnet-install.ps1 -Channel 10.0 -InstallDir "$env:USERPROFILE\.dotnet"
    - $env:PATH = "$env:USERPROFILE\.dotnet;$env:PATH"
  script:
    - dotnet restore fsharp/src/RpgmDecrypt.slnx
    - dotnet build fsharp/src/RpgmDecrypt.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true
    - dotnet run --project fsharp/src/RpgmDecrypt.Tests -c Release --no-build

# ---- OCaml port build + parity tests on Windows (opam) --------------------
# opam on Windows bootstraps its own Cygwin + builds the compiler, which is slow
# and consumes scarce trial Windows minutes, so this is opt-in (when: manual)
# and never blocks the pipeline (allow_failure). Native parity on Windows is
# also verified on the local dev box; this job is the CI mirror of that.
ocaml-build-test-windows:
  stage: test
  tags:
    - saas-windows-medium-amd64
  when: manual
  allow_failure: true
  before_script:
    - choco install opam --yes --no-progress
    - opam init --auto-setup --yes --disable-sandboxing
    - opam install --yes dune camlzip yojson re ocamlformat
  script:
    - cd ocaml
    - opam exec -- dune build --profile release
    - opam exec -- dune build @fmt   # format gate (ocamlformat 0.29.0)
    - opam exec -- dune exec --profile release test/test.exe

# ---- OCaml port (ocaml/) — build + parity tests on a Linux OCaml toolchain --
ocaml-build-test:
  stage: test
  image: ubuntu:26.04
  variables:
    DEBIAN_FRONTEND: noninteractive
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq ocaml ocaml-dune ocaml-findlib libzip-ocaml-dev libyojson-ocaml-dev libre-ocaml-dev
  script:
    - cd ocaml
    - dune build --profile release
    - dune exec --profile release test/test.exe

# ---- Coverage-guided fuzzing of the OCaml parsers --------------------------
# Runs the reliable in-process fuzzer, then a real coverage-guided afl-fuzz
# campaign against the -afl-instrument'd target (the CI runner has the internet
# the local WSL lacked, so it can install afl++). allow_failure so afl env
# quirks never block the pipeline; a real crash still surfaces.
ocaml-fuzz:
  stage: fuzz
  image: ubuntu:26.04
  needs: ["ocaml-build-test"]
  allow_failure: true
  variables:
    DEBIAN_FRONTEND: noninteractive
    AFL_SKIP_BIN_CHECK: "1"
    AFL_SKIP_CPUFREQ: "1"
    AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES: "1"
    AFL_NO_AFFINITY: "1"
    AFL_CRASH_EXITCODE: "2"
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq ocaml ocaml-dune ocaml-findlib libzip-ocaml-dev libyojson-ocaml-dev libre-ocaml-dev afl++
  script:
    - cd ocaml
    - dune build --profile release fuzz/fuzz.exe
    - echo "=== in-process fuzz (reliable, 30s) ==="
    - FUZZ_SECONDS=30 dune exec --profile release fuzz/fuzz.exe
    - echo "=== coverage-guided afl-fuzz (90s) ==="
    - mkdir -p seeds
    - printf 'RGSSAD\x00\x01' > seeds/s1
    - printf 'RGSSAD\x00\x02' > seeds/s2
    - printf 'RGSSAD\x00\x03\x00\x00\x00\x00' > seeds/s3
    - printf 'PK\x03\x04' > seeds/s4
    - printf '\x89PNG\r\n\x1a\n' > seeds/s5
    - timeout 120 afl-fuzz -V 90 -m none -i seeds -o aflout -- ./_build/default/fuzz/fuzz.exe @@ || echo "afl finished"
    - grep -E "execs_done|corpus_count|saved_crashes|execs_per_sec" aflout/default/fuzzer_stats 2>/dev/null || true
    - 'CR=$(grep -E "^saved_crashes" aflout/default/fuzzer_stats 2>/dev/null | tr -cd "0-9"); echo "afl saved_crashes=${CR:-0}"; [ "${CR:-0}" = "0" ]'

# ---- OCaml verification: property tests + Gospel spec type-check (Linux/opam) -
# opam-based (qcheck and gospel are not in the ubuntu apt set used by
# ocaml-build-test). Builds the library, runs the 72 parity checks + the 12
# QCheck2 properties, then `gospel check` on every spec'd .mli. On Linux gospel
# exits 0 cleanly (the Windows/mingw `output_value` marshal bug does not occur).
# allow_failure so opam-env quirks never block the pipeline; a real spec or
# property failure still surfaces in the job log.
ocaml-verification:
  stage: test
  image: ocaml/opam:debian-12-ocaml-5.3
  allow_failure: true
  before_script:
    - opam install -y dune camlzip yojson re qcheck gospel
  script:
    - cd ocaml
    - eval $(opam env)
    - dune build --profile release
    - dune exec --profile release test/test.exe
    - dune exec --profile release test/prop/prop.exe
    - mkdir -p /tmp/gci
    - cp lib/types.mli /tmp/gci/Types.mli
    - cp lib/log.mli /tmp/gci/Log.mli
    - ocamlc -c -I /tmp/gci /tmp/gci/Types.mli
    - ocamlc -c -I /tmp/gci /tmp/gci/Log.mli
    - gospel check lib/crypto.mli
    - gospel check lib/vxace_key.mli
    - gospel check lib/rgssad_core.mli
    - gospel check lib/dispatch.mli -L /tmp/gci
    - gospel check lib/report.mli -L /tmp/gci

# ---- OCaml deductive verification (Cameleer/Why3) — manual, Linux/opam -------
# Best-effort: installs cameleer + why3 + alt-ergo and runs the prover on the
# proof-target modules (Vxace_key.derive_master_key, Report.safe_join
# containment, Rgssad_core bounds). Manual + allow_failure because cameleer's
# opam availability / OCaml-version support and the proof outcome (some VCs are
# conditional on the axiomatised bytes/string helpers, since Gospel 0.3.1 has no
# Bytes/String theory) may need human review. See ocaml/README.md "Formal
# guarantees".
ocaml-cameleer:
  stage: test
  image: ocaml/opam:debian-12-ocaml-5.3
  when: manual
  allow_failure: true
  before_script:
    - opam install -y dune camlzip yojson re gospel cameleer why3 alt-ergo
    - eval $(opam env) && why3 config detect
  script:
    - cd ocaml
    - eval $(opam env)
    - cameleer lib/vxace_key.ml
    - cameleer lib/crypto.ml
    - cameleer lib/rgssad_core.ml
    - cameleer lib/report.ml

# ---- Mirror to GitHub (source + tags) via SSH deploy key -------------------
# GitLab is the build/test farm (F# + OCaml tests, fuzz, verification). GitHub
# is the clean distribution channel. This job mirrors the tested ref to GitHub
# over SSH using a deploy key (NO PAT needed): a push to main mirrors main; a
# tag push mirrors the tag, which TRIGGERS the GitHub Actions release workflow
# (.github/workflows/ci.yml) that builds the OCaml static flagship + F# binaries
# and creates the GitHub Release with the auto-provided GITHUB_TOKEN.
#
# Runs only after the hard Linux gates (F# build-test, OCaml parity) are green.
# The Windows F# gate (build-test-windows) and the allow_failure jobs
# (ocaml-fuzz, ocaml-verification, ocaml-build-test-windows) run alongside but
# do not block the mirror, so SaaS-Windows availability or afl/opam env quirks
# never stall shipping. The GitHub Actions release re-runs the full suite as its
# own gate before publishing.
#
# Required CI/CD variable (GitLab -> Settings -> CI/CD -> Variables):
#   GH_SSH_PRIVATE_KEY  the SSH PRIVATE key matching the GitHub deploy key on
#                       rolanfreeman6-png/rpgm-decrypt (added via `gh`). Masked
#                       + protected; mark `main` protected so the variable
#                       reaches this job. Without it the job fails fast.
github-mirror:
  stage: publish
  image: alpine:3.20
  needs:
    - job: build-test
    - job: ocaml-build-test
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache openssh-client git
  script:
    - |
      set -eu
      if [ -z "${GH_SSH_PRIVATE_KEY:-}" ]; then
        echo "ERROR: set GH_SSH_PRIVATE_KEY in GitLab CI/CD Variables (SSH private key matching the GitHub deploy key on rolanfreeman6-png/rpgm-decrypt)."
        exit 1
      fi
      mkdir -p ~/.ssh
      chmod 700 ~/.ssh
      printf '%s\n' "$GH_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
      chmod 600 ~/.ssh/id_ed25519
      ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
      git remote remove github 2>/dev/null || true
      git remote add github git@github.com:rolanfreeman6-png/rpgm-decrypt.git
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        git push github "$CI_COMMIT_SHA:refs/tags/$CI_COMMIT_TAG"
        echo "=== pushed tag $CI_COMMIT_TAG to GitHub (triggers release workflow) ==="
      else
        git push github "$CI_COMMIT_SHA:refs/heads/main"
        echo "=== mirrored main to GitHub ==="
      fi
