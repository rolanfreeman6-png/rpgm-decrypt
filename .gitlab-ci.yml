# GitLab CI for rpgm-decrypt.
#
# The OCaml flagship is built + tested here on every push (Linux apt toolchain,
# plus a manual Windows opam job), then fuzzed and formally verified. GitLab is
# the build/test farm; GitHub is the clean distribution channel: `github-mirror`
# pushes the tested ref over SSH, and a `v*` tag triggers the GitHub Actions
# release workflow that builds the static-musl flagship binary.

# GitLab-managed security scanners (Ultimate). SAST analyses the source, Secret
# Detection scans history for leaked credentials. Results land in Security &
# Compliance → Vulnerability report. Each template defines its own job in the
# `test` stage.
include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml

stages:
  - test
  - fuzz
  - publish

# ---- OCaml build + behavioural tests on Windows (opam) --------------------
# opam on Windows bootstraps its own Cygwin + builds the compiler, which is slow
# and consumes scarce trial Windows minutes, so this is opt-in (when: manual)
# and never blocks the pipeline (allow_failure). Native behavioural on Windows is
# also verified on the local dev box; this job is the CI mirror of that.
ocaml-build-test-windows:
  stage: test
  tags:
    - saas-windows-medium-amd64
  when: manual
  allow_failure: true
  before_script:
    - choco install opam --yes --no-progress
    - opam init --auto-setup --yes --disable-sandboxing
    - opam install --yes dune camlzip yojson re ocamlformat
  script:
    # Same qcheck exclusion as the Linux apt job: build only bin + behavioural test.
    # opam here installs no qcheck; the property suite runs in ocaml-verification.
    - cd ocaml
    - opam exec -- dune build --profile release bin/main.exe test/test.exe
    - opam exec -- dune build @fmt   # format gate (ocamlformat 0.29.0)
    - opam exec -- dune exec --profile release test/test.exe

# ---- OCaml (ocaml/) — build + behavioural tests on a Linux OCaml toolchain --
ocaml-build-test:
  stage: test
  image: ubuntu:26.04
  variables:
    DEBIAN_FRONTEND: noninteractive
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq ocaml ocaml-dune ocaml-findlib libzip-ocaml-dev libyojson-ocaml-dev libre-ocaml-dev
  script:
    # Build only the qcheck-free artifacts: the default alias (`dune build`)
    # would also build test/prop/prop.exe, which needs qcheck-core.runner — not
    # in the apt set. The property suite runs in `ocaml-verification` (opam,
    # installs qcheck). Explicit targets avoid pulling prop in here.
    - cd ocaml
    - dune build --profile release bin/main.exe test/test.exe
    - dune exec --profile release test/test.exe

# ---- Coverage-guided fuzzing of the OCaml parsers --------------------------
# Runs the reliable in-process fuzzer, then a real coverage-guided afl-fuzz
# campaign against the -afl-instrument'd target (the CI runner has the internet
# the local WSL lacked, so it can install afl++). allow_failure so afl env
# quirks never block the pipeline; a real crash still surfaces.
ocaml-fuzz:
  stage: fuzz
  image: ubuntu:26.04
  needs: ["ocaml-build-test"]
  allow_failure: true
  variables:
    DEBIAN_FRONTEND: noninteractive
    AFL_SKIP_BIN_CHECK: "1"
    AFL_SKIP_CPUFREQ: "1"
    AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES: "1"
    AFL_NO_AFFINITY: "1"
    AFL_CRASH_EXITCODE: "2"
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq ocaml ocaml-dune ocaml-findlib libzip-ocaml-dev libyojson-ocaml-dev libre-ocaml-dev afl++
  script:
    - cd ocaml
    - dune build --profile release fuzz/fuzz.exe
    - echo "=== in-process fuzz (reliable, 30s) ==="
    - FUZZ_SECONDS=30 dune exec --profile release fuzz/fuzz.exe
    - echo "=== coverage-guided afl-fuzz (90s) ==="
    - mkdir -p seeds
    - printf 'RGSSAD\x00\x01' > seeds/s1
    - printf 'RGSSAD\x00\x02' > seeds/s2
    - printf 'RGSSAD\x00\x03\x00\x00\x00\x00' > seeds/s3
    - printf 'PK\x03\x04' > seeds/s4
    - printf '\x89PNG\r\n\x1a\n' > seeds/s5
    - timeout 120 afl-fuzz -V 90 -m none -i seeds -o aflout -- ./_build/default/fuzz/fuzz.exe @@ || echo "afl finished"
    - grep -E "execs_done|corpus_count|saved_crashes|execs_per_sec" aflout/default/fuzzer_stats 2>/dev/null || true
    - 'CR=$(grep -E "^saved_crashes" aflout/default/fuzzer_stats 2>/dev/null | tr -cd "0-9"); echo "afl saved_crashes=${CR:-0}"; [ "${CR:-0}" = "0" ]'

# ---- Weekly long-run fuzzing (2h, scheduled) -------------------------------
# A deeper coverage-guided campaign than the per-push 90s one. Runs ONLY on
# pipeline schedules (GitLab -> Build -> Pipeline schedules, e.g. a weekly
# cron). 2h of afl-fuzz (~hundreds of millions of execs) against the
# -afl-instrument'd target with a fresh corpus each run. allow_failure so the
# schedule never shows red on env quirks, but any crash is captured as an
# artifact (aflout/default/crashes/) and the stats line prints saved_crashes.
# To enable: create a schedule (e.g. "0 3 * * 0" = Sunday 03:00 UTC) targeting
# main; this job picks it up via $CI_PIPELINE_SOURCE == "schedule".
ocaml-fuzz-weekly:
  stage: fuzz
  image: ubuntu:26.04
  needs: ["ocaml-build-test"]
  allow_failure: true
  timeout: 2h 30m
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  variables:
    DEBIAN_FRONTEND: noninteractive
    AFL_SKIP_BIN_CHECK: "1"
    AFL_SKIP_CPUFREQ: "1"
    AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES: "1"
    AFL_NO_AFFINITY: "1"
    AFL_CRASH_EXITCODE: "2"
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq ocaml ocaml-dune ocaml-findlib libzip-ocaml-dev libyojson-ocaml-dev libre-ocaml-dev afl++
  script:
    - cd ocaml
    - dune build --profile release fuzz/fuzz.exe
    - echo "=== weekly afl-fuzz (2h / 7200s) ==="
    - mkdir -p seeds
    - printf 'RGSSAD\x00\x01' > seeds/s1
    - printf 'RGSSAD\x00\x02' > seeds/s2
    - printf 'RGSSAD\x00\x03\x00\x00\x00\x00' > seeds/s3
    - printf 'PK\x03\x04' > seeds/s4
    - printf '\x89PNG\r\n\x1a\n' > seeds/s5
    - timeout 7260 afl-fuzz -V 7200 -m none -i seeds -o aflout -- ./_build/default/fuzz/fuzz.exe @@ || echo "afl finished"
    - grep -E "execs_done|corpus_count|saved_crashes|execs_per_sec|unique_crashes" aflout/default/fuzzer_stats 2>/dev/null || true
    - 'CR=$(grep -E "^(saved_crashes|unique_crashes)" aflout/default/fuzzer_stats 2>/dev/null | tr -cd "0-9" | head -1); echo "weekly afl saved_crashes=${CR:-0}"'
  artifacts:
    when: on_failure
    paths:
      - ocaml/aflout/default/crashes/
    expire_in: 2 weeks

# ---- OCaml verification: property tests + Gospel spec type-check (Linux/opam) -
# opam-based (qcheck and gospel are not in the ubuntu apt set used by
# ocaml-build-test). Builds the library, runs the 72 behavioural checks + the 12
# QCheck2 properties, then `gospel check` on every spec'd .mli. On Linux gospel
# exits 0 cleanly (the Windows/mingw `output_value` marshal bug does not occur).
# allow_failure so opam-env quirks never block the pipeline; a real spec or
# property failure still surfaces in the job log.
ocaml-verification:
  stage: test
  image: ocaml/opam:debian-12-ocaml-5.3
  allow_failure: true
  before_script:
    - opam install -y dune camlzip yojson re qcheck gospel
  script:
    - cd ocaml
    - eval $(opam env)
    - dune build --profile release
    - dune exec --profile release test/test.exe
    - dune exec --profile release test/prop/prop.exe
    - mkdir -p /tmp/gci
    - cp lib/types.mli /tmp/gci/Types.mli
    - cp lib/log.mli /tmp/gci/Log.mli
    - ocamlc -c -I /tmp/gci /tmp/gci/Types.mli
    - ocamlc -c -I /tmp/gci /tmp/gci/Log.mli
    - gospel check lib/crypto.mli
    - gospel check lib/vxace_key.mli
    - gospel check lib/rgssad_core.mli
    - gospel check lib/dispatch.mli -L /tmp/gci
    - gospel check lib/report.mli -L /tmp/gci

# ---- OCaml code coverage (bisect_ppx) — Linux/opam, manual ------------------
# Instruments the library with bisect_ppx, runs the 72 behavioural checks + 12
# QCheck properties under instrumentation, and generates an HTML coverage
# report + Cobertura XML (bisect_ppx 2.8.x emits html/cobertura/coveralls/
# summary; it dropped native LCOV output). The committed snapshot lives in
# ocaml/coverage/ (regenerated locally as above); this job reproduces it in CI
# and exposes the report as a downloadable artifact. allow_failure so an
# opam/bisect env quirk never blocks the pipeline.
ocaml-coverage:
  stage: test
  image: ocaml/opam:debian-12-ocaml-5.3
  when: manual
  allow_failure: true
  before_script:
    - opam install -y dune camlzip yojson re qcheck bisect_ppx
  script:
    - cd ocaml
    - eval $(opam env)
    - dune clean
    - dune build --instrument-with bisect_ppx --force test/test.exe test/prop/prop.exe
    - BISECT_FILE=$PWD/_build/cov dune exec --instrument-with bisect_ppx --force test/test.exe
    - BISECT_FILE=$PWD/_build/cov dune exec --instrument-with bisect_ppx --force test/prop/prop.exe
    - bisect-ppx-report summary --per-file _build/*.coverage
    - bisect-ppx-report cobertura coverage.cobertura.xml _build/*.coverage
    - bisect-ppx-report html _build/*.coverage -o coverage_html
  artifacts:
    paths:
      - ocaml/coverage_html/
      - ocaml/coverage.cobertura.xml
    expire_in: 2 weeks

# ---- OCaml deductive verification (Why3 + Z3) — manual, Linux --------------
# Cameleer is not in the opam repository (no `cameleer` package), so instead of
# cameleer's auto OCaml->WhyML translation we prove the contracts in a
# hand-written WhyML model: ocaml/proofs/rpgm_proof.mlw. The axiomatised Gospel
# helpers (read_u32_le, u32, normalize) are DEFINED in WhyML, and path
# components are modelled as an algebraic [comp] type so Z3 can case-split the
# constructors. With `why3 prove -P z3 -a split_goal_full` ALL goals discharge:
# derive_master_key = u32(seed*9+3), read_u32_le LE formula, the Zip-Slip
# invariant (normalize never yields a ".." component — a program proof with the
# invariant as the postcondition), and rgssad_core read_entry/advance bounds.
# Verified locally (see ocaml/proofs/proof_output.txt: 23/23 Valid). Manual +
# allow_failure so a Linux Z3/version quirk never blocks the pipeline; a real
# proof regression surfaces in the job log.
ocaml-why3-proof:
  stage: test
  image: ocaml/opam:debian-12-ocaml-5.3
  when: manual
  allow_failure: true
  before_script:
    - sudo apt-get update -qq && sudo apt-get install -y -qq z3
    - opam install -y why3
    - eval $(opam env) && why3 config detect
  script:
    - cd ocaml
    - eval $(opam env)
    - echo "=== why3 prove (z3, split_goal_full) ==="
    - why3 prove -P z3 -a split_goal_full -t 30 proofs/rpgm_proof.mlw
    - echo "=== count discharged goals ==="
    - 'why3 prove -P z3 -a split_goal_full -t 30 proofs/rpgm_proof.mlw 2>&1 | grep -cE "Prover result is: Valid" || true'

# ---- Mirror to GitHub (source + tags) via SSH deploy key -------------------
# GitLab is the build/test farm (OCaml tests, fuzz, verification). GitHub is
# the clean distribution channel. This job mirrors the tested ref to GitHub
# over SSH using a deploy key (NO PAT needed): a push to main mirrors main; a
# tag push mirrors the tag, which TRIGGERS the GitHub Actions release workflow
# (.github/workflows/ci.yml) that builds the OCaml static flagship and creates
# the GitHub Release with the auto-provided GITHUB_TOKEN.
#
# Runs only after the hard Linux gate (OCaml build + behavioural) is green. The
# allow_failure jobs (ocaml-fuzz, ocaml-verification, ocaml-build-test-windows)
# run alongside but do not block the mirror, so afl/opam env quirks never stall
# shipping. The GitHub Actions release re-runs the build + behavioural as its own
# gate before publishing.
#
# Required CI/CD variable (GitLab -> Settings -> CI/CD -> Variables):
#   GH_SSH_PRIVATE_KEY  the SSH PRIVATE key matching the GitHub deploy key on
#                       rolanfreeman6-png/rpgm-decrypt. Masked + protected; mark
#                       `main` protected so the variable reaches this job.
#                       Without it the job fails fast.
github-mirror:
  stage: publish
  image: alpine:3.20
  needs:
    - job: ocaml-build-test
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache openssh-client git
  script:
    - |
      set -eu
      if [ -z "${GH_SSH_PRIVATE_KEY:-}" ]; then
        echo "ERROR: set GH_SSH_PRIVATE_KEY in GitLab CI/CD Variables (SSH private key matching the GitHub deploy key on rolanfreeman6-png/rpgm-decrypt)."
        exit 1
      fi
      mkdir -p ~/.ssh
      chmod 700 ~/.ssh
      printf '%s\n' "$GH_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
      chmod 600 ~/.ssh/id_ed25519
      ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
      git remote remove github 2>/dev/null || true
      git remote add github git@github.com:rolanfreeman6-png/rpgm-decrypt.git
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        git push github "$CI_COMMIT_SHA:refs/tags/$CI_COMMIT_TAG"
        echo "=== pushed tag $CI_COMMIT_TAG to GitHub (triggers release workflow) ==="
      else
        git push github "$CI_COMMIT_SHA:refs/heads/main"
        echo "=== mirrored main to GitHub ==="
      fi

# =============================================================================
# Release binaries: BUILT ON GITLAB, PUBLISHED TO GITHUB RELEASES.
# GitHub Actions is billing-blocked, so instead of triggering it we build the
# binaries here (GitLab Ultimate has the CI minutes) and upload them straight to
# the GitHub Release via a GitHub token. Runs only on v* tags.
#
# Required CI/CD variable (GitLab -> Settings -> CI/CD -> Variables):
#   GH_TOKEN  a GitHub Personal Access Token with Contents read+write on
#             rolanfreeman6-png/rpgm-decrypt (fine-grained: Contents=Read&write;
#             or classic token with the `repo` scope). Masked. Without it the
#             github-release job fails fast with a clear message.
# =============================================================================

# ---- Linux x86-64: static musl single binary, zero runtime deps ------------
release-linux:
  stage: publish
  image: alpine:3.20
  needs:
    - job: ocaml-build-test
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/
  script:
    - apk add --no-cache ocaml opam build-base musl-dev zlib-dev zlib-static bash coreutils file tar
    - opam init --disable-sandboxing --bare -ay
    - opam switch create default ocaml-base-compiler.5.3.0 -y
    - eval $(opam env)
    # --no-depexts: zlib-dev is already apk-installed above; opam's depext
    # resolver mis-detects it on Alpine and fails conf-zlib unnecessarily.
    - opam install -y --no-depexts dune camlzip yojson re
    - cd ocaml
    - dune build --profile static bin/main.exe
    - cp _build/default/bin/main.exe ../rpgm-decrypt-linux-x64
    - chmod +x ../rpgm-decrypt-linux-x64
    - cd ..
    - file rpgm-decrypt-linux-x64
    - ./rpgm-decrypt-linux-x64 --version
  artifacts:
    paths:
      - rpgm-decrypt-linux-x64
    expire_in: 1 week

# ---- Windows x86-64: native .exe + zlib1.dll + decrypt.bat, in a zip --------
# SaaS Windows runner. opam is installed via winget (OCaml.opam — the choco
# package was removed from the community feed) which is the same package used
# on the dev machine. opam bootstraps Cygwin + mingw64 (~20-30 min).
# allow_failure: true so a SaaS/winget/opam quirk never blocks the Linux
# release; github-release uploads whichever binaries were produced.
release-windows:
  stage: publish
  tags:
    - saas-windows-medium-amd64
  needs:
    - job: ocaml-build-test
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/
  before_script:
    - winget install --id OCaml.opam --accept-package-agreements --accept-source-agreements
    - $env:PATH = "$env:LOCALAPPDATA\Microsoft\WinGet\Packages\OCaml.opam_Microsoft.Winget.Source_8wekyb3d8bbwe;$env:PATH"
    - opam init --auto-setup --yes --disable-sandboxing
    - opam install --yes dune camlzip yojson re
  script:
    - cd ocaml
    - opam exec -- dune build --profile release bin/main.exe
    - Copy-Item _build/default/bin/main.exe ../rpgm-decrypt.exe
    - $root = opam var root
    - $dll = Get-ChildItem -Path $root -Recurse -Filter zlib1.dll -ErrorAction SilentlyContinue | Select-Object -First 1
    - if (-not $dll) { throw "zlib1.dll not found under opam root $root" }
    - Copy-Item $dll.FullName ../zlib1.dll
    - cd ..
    - Copy-Item packaging/decrypt.bat decrypt.bat
    - Compress-Archive -Path rpgm-decrypt.exe, zlib1.dll, decrypt.bat -DestinationPath rpgm-decrypt-windows-x64.zip -Force
  artifacts:
    paths:
      - rpgm-decrypt-windows-x64.zip
    expire_in: 1 week

# ---- Publish the built binaries to the GitHub Release -----------------------
# Runs on GitLab (no GitHub Actions minutes used — only gh CLI REST calls).
# macOS is NOT built here: GitLab SaaS has no macOS runners. See the release
# notes / README for the macOS situation. idempotent create-or-upload.
github-release:
  stage: publish
  image: alpine:3.20
  needs:
    - job: release-linux
    - job: release-windows
      optional: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/
  script:
    - |
      set -eu
      if [ -z "${GH_TOKEN:-}" ]; then
        echo "ERROR: set CI/CD variable GH_TOKEN (GitHub PAT, Contents read+write on rolanfreeman6-png/rpgm-decrypt)."
        exit 1
      fi
      apk add --no-cache github-cli
      export GH_TOKEN
      REPO=rolanfreeman6-png/rpgm-decrypt
      FILES=""
      [ -f rpgm-decrypt-linux-x64 ]       && FILES="$FILES rpgm-decrypt-linux-x64"
      [ -f rpgm-decrypt-windows-x64.zip ] && FILES="$FILES rpgm-decrypt-windows-x64.zip"
      if [ -z "$FILES" ]; then echo "ERROR: no built binaries found to upload"; exit 1; fi
      echo "=== uploading to GitHub Release $CI_COMMIT_TAG:$FILES ==="
      if gh release view "$CI_COMMIT_TAG" --repo "$REPO" >/dev/null 2>&1; then
        gh release upload "$CI_COMMIT_TAG" $FILES --repo "$REPO" --clobber
      else
        gh release create "$CI_COMMIT_TAG" $FILES --repo "$REPO" --target main \
          --title "$CI_COMMIT_TAG" \
          --notes "rpgm-decrypt $CI_COMMIT_TAG. Linux: static musl single binary (chmod +x and run). Windows: extract the zip (rpgm-decrypt.exe + zlib1.dll + decrypt.bat) and run the .exe. Built on GitLab CI."
      fi
      echo "=== done ==="
