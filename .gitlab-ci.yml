# GitLab CI for rpgm-decrypt.
#
# Mirrors the GitHub Actions build+test gate. Linux coverage runs on the free
# gitlab.com Docker runners (.NET 10 SDK image). Windows coverage runs on the
# GitLab SaaS Windows runners (tag saas-windows-medium-amd64): the F# product
# is built+tested automatically there; the OCaml port is a manual job (opam on
# Windows is a slow build, so it stays opt-in to spare trial CI minutes).
# macOS coverage stays on GitHub Actions / local runs.
#
# TreatWarningsAsErrors is enforced both by src/Directory.Build.props and the
# explicit -p: flag below, matching the GitHub `test` job.

# GitLab-managed security scanners (Ultimate). SAST analyses the source,
# Secret Detection scans history for leaked credentials, Dependency Scanning
# checks NuGet packages for known CVEs. Results land in Security & Compliance →
# Vulnerability report. Each template defines its own job in the `test` stage.
include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml

stages:
  - test
  - fuzz
  - publish

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

default:
  image: mcr.microsoft.com/dotnet/sdk:10.0

build-test:
  stage: test
  script:
    - dotnet restore src/RpgmDecrypt.slnx
    - dotnet build src/RpgmDecrypt.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true
    - dotnet run --project src/RpgmDecrypt.Tests -c Release --no-build

# ---- F# build + test on the GitLab SaaS Windows runner --------------------
# Windows coverage for the actually-shipped decryptor. .NET 10 is too new to be
# preinstalled on the SaaS image, so we fetch it via the official install script.
build-test-windows:
  stage: test
  tags:
    - saas-windows-medium-amd64
  before_script:
    - Invoke-WebRequest -Uri 'https://dot.net/v1/dotnet-install.ps1' -OutFile 'dotnet-install.ps1'
    - .\dotnet-install.ps1 -Channel 10.0 -InstallDir "$env:USERPROFILE\.dotnet"
    - $env:PATH = "$env:USERPROFILE\.dotnet;$env:PATH"
  script:
    - dotnet restore src/RpgmDecrypt.slnx
    - dotnet build src/RpgmDecrypt.slnx -c Release --no-restore -p:TreatWarningsAsErrors=true
    - dotnet run --project src/RpgmDecrypt.Tests -c Release --no-build

# ---- OCaml port build + parity tests on Windows (opam) --------------------
# opam on Windows bootstraps its own Cygwin + builds the compiler, which is slow
# and consumes scarce trial Windows minutes, so this is opt-in (when: manual)
# and never blocks the pipeline (allow_failure). Native parity on Windows is
# also verified on the local dev box; this job is the CI mirror of that.
ocaml-build-test-windows:
  stage: test
  tags:
    - saas-windows-medium-amd64
  when: manual
  allow_failure: true
  before_script:
    - choco install opam --yes --no-progress
    - opam init --auto-setup --yes --disable-sandboxing
    - opam install --yes dune camlzip yojson re ocamlformat
  script:
    - cd ocaml
    - opam exec -- dune build --profile release
    - opam exec -- dune build @fmt   # format gate (ocamlformat 0.29.0)
    - opam exec -- dune exec --profile release test/test.exe

# ---- OCaml port (ocaml/) — build + parity tests on a Linux OCaml toolchain --
ocaml-build-test:
  stage: test
  image: ubuntu:26.04
  variables:
    DEBIAN_FRONTEND: noninteractive
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq ocaml ocaml-dune ocaml-findlib libzip-ocaml-dev libyojson-ocaml-dev libre-ocaml-dev
  script:
    - cd ocaml
    - dune build --profile release
    - dune exec --profile release test/test.exe

# ---- Coverage-guided fuzzing of the OCaml parsers --------------------------
# Runs the reliable in-process fuzzer, then a real coverage-guided afl-fuzz
# campaign against the -afl-instrument'd target (the CI runner has the internet
# the local WSL lacked, so it can install afl++). allow_failure so afl env
# quirks never block the pipeline; a real crash still surfaces.
ocaml-fuzz:
  stage: fuzz
  image: ubuntu:26.04
  needs: ["ocaml-build-test"]
  allow_failure: true
  variables:
    DEBIAN_FRONTEND: noninteractive
    AFL_SKIP_BIN_CHECK: "1"
    AFL_SKIP_CPUFREQ: "1"
    AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES: "1"
    AFL_NO_AFFINITY: "1"
    AFL_CRASH_EXITCODE: "2"
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq ocaml ocaml-dune ocaml-findlib libzip-ocaml-dev libyojson-ocaml-dev libre-ocaml-dev afl++
  script:
    - cd ocaml
    - dune build --profile release fuzz/fuzz.exe
    - echo "=== in-process fuzz (reliable, 30s) ==="
    - FUZZ_SECONDS=30 dune exec --profile release fuzz/fuzz.exe
    - echo "=== coverage-guided afl-fuzz (90s) ==="
    - mkdir -p seeds
    - printf 'RGSSAD\x00\x01' > seeds/s1
    - printf 'RGSSAD\x00\x02' > seeds/s2
    - printf 'RGSSAD\x00\x03\x00\x00\x00\x00' > seeds/s3
    - printf 'PK\x03\x04' > seeds/s4
    - printf '\x89PNG\r\n\x1a\n' > seeds/s5
    - timeout 120 afl-fuzz -V 90 -m none -i seeds -o aflout -- ./_build/default/fuzz/fuzz.exe @@ || echo "afl finished"
    - grep -E "execs_done|corpus_count|saved_crashes|execs_per_sec" aflout/default/fuzzer_stats 2>/dev/null || true
    - 'CR=$(grep -E "^saved_crashes" aflout/default/fuzzer_stats 2>/dev/null | tr -cd "0-9"); echo "afl saved_crashes=${CR:-0}"; [ "${CR:-0}" = "0" ]'

# ---- OCaml verification: property tests + Gospel spec type-check (Linux/opam) -
# opam-based (qcheck and gospel are not in the ubuntu apt set used by
# ocaml-build-test). Builds the library, runs the 72 parity checks + the 12
# QCheck2 properties, then `gospel check` on every spec'd .mli. On Linux gospel
# exits 0 cleanly (the Windows/mingw `output_value` marshal bug does not occur).
# allow_failure so opam-env quirks never block the pipeline; a real spec or
# property failure still surfaces in the job log.
ocaml-verification:
  stage: test
  image: ocaml/opam:debian-12-ocaml-5.3
  allow_failure: true
  before_script:
    - opam install -y dune camlzip yojson re qcheck gospel
  script:
    - cd ocaml
    - eval $(opam env)
    - dune build --profile release
    - dune exec --profile release test/test.exe
    - dune exec --profile release test/prop/prop.exe
    - mkdir -p /tmp/gci
    - cp lib/types.mli /tmp/gci/Types.mli
    - cp lib/log.mli /tmp/gci/Log.mli
    - ocamlc -c -I /tmp/gci /tmp/gci/Types.mli
    - ocamlc -c -I /tmp/gci /tmp/gci/Log.mli
    - gospel check lib/crypto.mli
    - gospel check lib/vxace_key.mli
    - gospel check lib/rgssad_core.mli
    - gospel check lib/dispatch.mli -L /tmp/gci
    - gospel check lib/report.mli -L /tmp/gci

# ---- OCaml deductive verification (Cameleer/Why3) — manual, Linux/opam -------
# Best-effort: installs cameleer + why3 + alt-ergo and runs the prover on the
# proof-target modules (Vxace_key.derive_master_key, Report.safe_join
# containment, Rgssad_core bounds). Manual + allow_failure because cameleer's
# opam availability / OCaml-version support and the proof outcome (some VCs are
# conditional on the axiomatised bytes/string helpers, since Gospel 0.3.1 has no
# Bytes/String theory) may need human review. See ocaml/README.md "Formal
# guarantees".
ocaml-cameleer:
  stage: test
  image: ocaml/opam:debian-12-ocaml-5.3
  when: manual
  allow_failure: true
  before_script:
    - opam install -y dune camlzip yojson re gospel cameleer why3 alt-ergo
    - eval $(opam env) && why3 config detect
  script:
    - cd ocaml
    - eval $(opam env)
    - cameleer lib/vxace_key.ml
    - cameleer lib/crypto.ml
    - cameleer lib/rgssad_core.ml
    - cameleer lib/report.ml

# ---- Product binaries (built after the gates pass; consumed by the GitHub --
# release job below). GitLab is the build/test farm; GitHub is the clean
# distribution channel. Each publish job is a gate for the release.
publish-linux:
  stage: publish
  needs: ["build-test"]
  script:
    - dotnet publish src/RpgmDecrypt.Cli -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:StripSymbols=true -o artifacts/linux-x64
    - chmod +x artifacts/linux-x64/rpgm-decrypt
    - ./artifacts/linux-x64/rpgm-decrypt --version
  artifacts:
    paths:
      - artifacts/linux-x64/rpgm-decrypt
    expire_in: 1 week

# F# self-contained single-file .exe for Windows. Same .NET install dance as
# build-test-windows (duplicated on purpose: touching the shared job would risk
# the existing F# Windows gate, and these are scarce SaaS Windows minutes).
publish-windows:
  stage: publish
  tags:
    - saas-windows-medium-amd64
  needs: ["build-test-windows"]
  before_script:
    - Invoke-WebRequest -Uri 'https://dot.net/v1/dotnet-install.ps1' -OutFile 'dotnet-install.ps1'
    - .\dotnet-install.ps1 -Channel 10.0 -InstallDir "$env:USERPROFILE\.dotnet"
    - $env:PATH = "$env:USERPROFILE\.dotnet;$env:PATH"
  script:
    - dotnet publish src/RpgmDecrypt.Cli -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:StripSymbols=true -o artifacts/win-x64
    - .\artifacts\win-x64\rpgm-decrypt.exe --version
  artifacts:
    paths:
      - artifacts/win-x64/rpgm-decrypt.exe
    expire_in: 1 week

# OCaml port native Linux binary (bonus asset; depends on libz1c2 at runtime via
# camlzip). Not self-contained like the F# single-file, so the release notes flag
# the dependency.
publish-ocaml:
  stage: publish
  image: ubuntu:26.04
  needs: ["ocaml-build-test"]
  variables:
    DEBIAN_FRONTEND: noninteractive
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq ocaml ocaml-dune ocaml-findlib libzip-ocaml-dev libyojson-ocaml-dev libre-ocaml-dev
  script:
    - cd ocaml
    - dune build --profile release bin/main.exe
    - mkdir -p ../artifacts
    - cp _build/default/bin/main.exe ../artifacts/rpgm-decrypt-ocaml-linux
    - chmod +x ../artifacts/rpgm-decrypt-ocaml-linux
    - ldd ../artifacts/rpgm-decrypt-ocaml-linux || true
    - ../artifacts/rpgm-decrypt-ocaml-linux --version
  artifacts:
    paths:
      - artifacts/rpgm-decrypt-ocaml-linux
    expire_in: 1 week

# ---- Ship the tested binaries to GitHub as a Release ------------------------
# Runs only AFTER every gate (F# build+test, OCaml parity, OCaml verification,
# afl-fuzz) and every publish job has produced a binary. Creates a GitHub
# Release on rolanfreeman6-png/rpgm-decrypt and uploads the three assets via the
# GitHub REST API.
#
# Triggers:
#   - tags matching ^v\d   -> stable release (tag already exists on GitHub)
#   - push to main         -> "continuous" prerelease, overwritten each push
#
# Required CI/CD variable (GitLab -> Settings -> CI/CD -> Variables):
#   GITHUB_RELEASE_TOKEN  a GitHub PAT with Contents read/write on
#                         rolanfreeman6-png/rpgm-decrypt (classic PAT: `repo`
#                         scope; fine-grained: "Contents: Read and write").
# Masked + protected. Without it this job fails fast with a clear message.
github-release:
  stage: publish
  image: alpine:3.20
  needs:
    - job: build-test
    - job: ocaml-build-test
    - job: ocaml-verification
    - job: ocaml-fuzz
    - job: publish-linux
    - job: publish-windows
    - job: publish-ocaml
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    GH_OWNER: "rolanfreeman6-png"
    GH_REPO: "rpgm-decrypt"
  before_script:
    - apk add --no-cache curl jq coreutils
  script:
    - |
      set -eu
      if [ -z "${GITHUB_RELEASE_TOKEN:-}" ]; then
        echo "ERROR: set GITHUB_RELEASE_TOKEN in GitLab CI/CD Variables (GitHub PAT, Contents read/write on $GH_OWNER/$GH_REPO)."
        exit 1
      fi
      API="https://api.github.com/repos/$GH_OWNER/$GH_REPO"
      AUTH="Authorization: Bearer $GITHUB_RELEASE_TOKEN"
      ACC="Accept: application/vnd.github+json"
      APIVER="X-GitHub-Api-Version: 2022-11-28"
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        TAG="$CI_COMMIT_TAG"; PRE=false
        NAME="rpgm-decrypt $TAG"
        BODY="Release ${TAG} from commit ${CI_COMMIT_SHA}.\n\nGates: F# build-test ✓, OCaml parity 72/72 ✓, QCheck2 12/12 ✓, gospel check ✓, afl-fuzz 90s ✓."
      else
        TAG="continuous"; PRE=true
        NAME="rpgm-decrypt continuous ($CI_COMMIT_SHORT_SHA)"
        BODY="Continuous build from main ${CI_COMMIT_SHA}. Same gates as a tag release. Overwritten on every push to main."
        OLD=$(curl -fsS -H "$AUTH" -H "$ACC" "$API/releases/tags/continuous" | jq -r '.id // empty')
        if [ -n "$OLD" ]; then
          echo "Deleting previous continuous release $OLD"
          curl -fsS -X DELETE -H "$AUTH" -H "$ACC" "$API/releases/$OLD"
          curl -fsS -X DELETE -H "$AUTH" -H "$ACC" "$API/git/refs/tags/continuous" || true
        fi
      fi
      BODY_JSON=$(jq -n --arg tag "$TAG" --arg name "$NAME" --arg body "$BODY" --argjson pre "$PRE" \
        '{tag_name:$tag, target_commitish:"main", name:$name, body:$body, prerelease:$pre}')
      RESP=$(curl -fsS -X POST -H "$AUTH" -H "$ACC" -H "$APIVER" "$API/releases" -d "$BODY_JSON")
      REL_ID=$(printf '%s' "$RESP" | jq -r .id)
      UPLOAD=$(printf '%s' "$RESP" | jq -r .upload_url | sed 's/{?name,label}//')
      if [ -z "$REL_ID" ] || [ "$REL_ID" = "null" ] || [ -z "$UPLOAD" ]; then
        echo "ERROR: GitHub release creation failed:"; printf '%s\n' "$RESP"; exit 1
      fi
      echo "Created GitHub release id=$REL_ID tag=$TAG prerelease=$PRE"
      upload() {
        f="$1"; name="$2"; ct="${3:-application/octet-stream}"
        curl -fsS -X POST -H "$AUTH" -H "Accept: application/vnd.github+json" -H "Content-Type: $ct" \
          --data-binary @"$f" "$UPLOAD?name=$name"
        echo " uploaded $name ($(wc -c < "$f") bytes)"
      }
      upload artifacts/linux-x64/rpgm-decrypt rpgm-decrypt-linux-x64
      upload artifacts/win-x64/rpgm-decrypt.exe rpgm-decrypt-win-x64.exe
      upload artifacts/rpgm-decrypt-ocaml-linux rpgm-decrypt-ocaml-linux
      echo "=== Release $TAG published to https://github.com/$GH_OWNER/$GH_REPO/releases/tag/$TAG ==="
