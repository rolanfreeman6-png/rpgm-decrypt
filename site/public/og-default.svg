<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="60%" stop-color="#05060a"/>
      <stop offset="100%" stop-color="#0a0d18"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#ff8a3d" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#8a5cff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6e8bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a5cff"/>
      <stop offset="100%" stop-color="#ff8a3d"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="346" r="260" fill="url(#glow)"/>
  <g filter="url(#soft)">
    <ellipse cx="600" cy="346" rx="240" ry="44" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.85"/>
    <ellipse cx="600" cy="346" rx="180" ry="30" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.55"/>
  </g>
  <circle cx="600" cy="346" r="68" fill="#000"/>
  <text x="600" y="540" text-anchor="middle" fill="#e8eaf0"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="56" font-weight="600" letter-spacing="-1.2">rolanfreeman</text>
  <text x="600" y="585" text-anchor="middle" fill="#9aa0b4"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="400" letter-spacing="0.5">building tools that respect your bytes</text>
</svg>
