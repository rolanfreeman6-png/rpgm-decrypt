# SonarCloud configuration for rpgm-decrypt (OCaml).
#
# SonarCloud (SaaS) has no OCaml language analyzer, so the source itself is
# not checked for code smells — the meaningful quality gates for this project
# are the OCaml compiler warnings-as-errors (-warn-error +a-…), the 74
# behavioural checks, 12 QCheck properties, Gospel specs, and the Why3/Z3
# deductive proofs. This file exists to (a) point the scanner at the real
# source tree and (b) EXCLUDE generated artifacts so the dashboard is not
# polluted by them.
#
# Previously the scanner ingested ocaml/coverage/ (the bisect_ppx-generated
# HTML + Cobertura XML), producing ~1352 HTML-accessibility code smells and
# 26.8% duplication on generated boilerplate — none of it about the OCaml
# code. The exclusions below remove all generated/build output from analysis.

sonar.organization=rolanfreeman6-png
sonar.projectKey=rolanfreeman6-png_rpgm-decrypt
sonar.projectName=rpgm-decrypt
sonar.projectBaseDir=.

# The actual source tree (OCaml). SonarCloud will not run code-smell rules on
# .ml (no analyzer) but this is the honest set of files the project ships.
sonar.sources=ocaml/lib,ocaml/bin,ocaml/test,ocaml/fuzz

# Generated / build / non-source artifacts — never analyze.
#   coverage/      bisect_ppx HTML + Cobertura XML (the old 1352 smells lived here)
#   _build/        dune build output
#   dist-win/      local Windows packaging output
#   proofs/        WhyML + prover output (verification, not product code)
#   *.opam*        package manifests
#   *.html/*.xml   any generated markup/data
sonar.exclusions=**/coverage/**,**/_build/**,**/dist-win/**,**/proofs/**,**/*.opam,**/*.opam.locked,**/*.html,**/*.xml,**/*.json,**/*.mlw

# Coverage reports themselves are generated — never feed them as coverage data
# (they would re-introduce the generated HTML into the analysis).
sonar.coverage.exclusions=**/coverage/**

sonar.sourceEncoding=UTF-8
