name: release-macos

# macOS binary builder — the one platform GitLab SaaS CI cannot build (no
# macOS runners). GitLab CI builds Linux + Windows and publishes them to the
# GitHub Release (.gitlab-ci.yml `release-linux`/`release-windows`/
# `github-release`). This workflow builds ONLY the macOS binary on a GitHub
# `macos-latest` (Apple Silicon) runner and appends it to the SAME release.
#
# Both sides are idempotent: whichever runs first creates the release, the
# other uploads its assets to the existing one (gh release upload --clobber).
# Triggered by the v* tag that `github-mirror` pushes from GitLab, and by
# manual dispatch. Uses the auto-provided GITHUB_TOKEN (no PAT needed).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ocaml-macos-arm64:
    name: publish OCaml (macos-arm64, native)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup OCaml (opam)
        uses: ocaml/setup-ocaml@v2
        with:
          ocaml-compiler: 5.3.0
          packages: dune camlzip yojson re

      - name: Build the macOS binary (release)
        run: |
          opam exec -- dune build --profile release bin/main.exe
          cp _build/default/bin/main.exe rpgm-decrypt-macos-arm64
          chmod +x rpgm-decrypt-macos-arm64
          file rpgm-decrypt-macos-arm64
          ./rpgm-decrypt-macos-arm64 --version

      - name: Append the binary to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          echo "=== release-macos: tag=$TAG ==="
          # Idempotent: GitLab's github-release job may have created the
          # release already, or may run after this. Create if absent, then
          # upload (clobber replaces if it already exists).
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" --target main \
              --title "$TAG" \
              --notes "rpgm-decrypt $TAG — macOS (Apple Silicon) binary. Linux + Windows binaries are built on GitLab CI and published to this same release."
          fi
          gh release upload "$TAG" rpgm-decrypt-macos-arm64 \
            --repo "$GITHUB_REPOSITORY" --clobber
          echo "=== uploaded rpgm-decrypt-macos-arm64 to release $TAG ==="
